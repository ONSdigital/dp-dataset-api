---
platform: linux

image_resource:
  type: docker-image
  source:
    repository: onsdigital/dp-concourse-tools-docker-go
    tag: latest

inputs:
  - name: dp-dataset-api

run:
  path: bash
  args:
    - -exc
    - |
      /start_docker.sh
      dp-dataset-api/ci/scripts/unit.sh

caches:
  - path: /go
